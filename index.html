<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH 3</title>
    <link rel="icon" type="image/png" href="img/LogoJogo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="sidebar-top">
                <div class="logo-title">
                    <img src="img/LogoJogo.png" alt="Logo" class="logo-img">
                    <h1>Match3</h1>
                </div>

                <div class="menu-section">
                    <h3>Dificuldade</h3>
                    <select id="difficulty">
                        <option value="easy">Fácil</option>
                        <option value="medium">Médio</option>
                        <option value="hard">Impossível</option>
                    </select>
                </div>

                <div class="menu-section">
                    <h3>Placar</h3>
                    <p>X: <span id="scoreX">0</span></p>
                    <p>O: <span id="scoreO">0</span></p>
                    <p>Empates: <span id="draws">0</span></p>
                </div>
            </div>

            <div>
                <button id="trainBtn" class="btn primary">Treinar IA</button>
                <button id="restartBtn" class="btn secondary">Reiniciar</button>
            </div>

        </aside>

        <!-- MAIN -->
        <main class="main">

            <h1 id="status">Sua vez, Jogador X</h1>

            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

        </main>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>Desenvolvido por <strong>Carlos Daniel</strong></p>

            <div class="social-links">
                <a href="https://github.com/dani-ferreira31" target="_blank">
                    <i class="fab fa-github"></i> GitHub
                </a>

                <a href="https://www.linkedin.com/in/carlos-daniel-286b532b8/" target="_blank">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
            </div>
        </div>
    </footer>

    <!-- MODAL -->
    <div id="trainingModal" class="modal hidden">
        <div class="modal-box">
            <h2>Treinando IA...</h2>

            <div class="progress-bar-container">
                <div id="progressBar"></div>
            </div>

            <p id="progressText">0%</p>
            <p id="timeEstimate">Calculando tempo...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
